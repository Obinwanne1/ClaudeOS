<svg width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6b29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#407E3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background: brand green -->
  <rect width="900" height="160" rx="12" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="900" height="160" rx="12" fill="url(#shine)"/>

  <!-- Decorative grid dots top-right -->
  <circle cx="780" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="800" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="820" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="840" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="860" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="880" cy="24" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="780" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="800" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="820" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="840" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="860" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="880" cy="44" r="2" fill="#ffffff" opacity="0.08"/>
  <circle cx="780" cy="64" r="2" fill="#ffffff" opacity="0.05"/>
  <circle cx="800" cy="64" r="2" fill="#ffffff" opacity="0.05"/>
  <circle cx="820" cy="64" r="2" fill="#ffffff" opacity="0.05"/>
  <circle cx="840" cy="64" r="2" fill="#ffffff" opacity="0.05"/>
  <circle cx="860" cy="64" r="2" fill="#ffffff" opacity="0.05"/>
  <circle cx="880" cy="64" r="2" fill="#ffffff" opacity="0.05"/>

  <!-- White accent bar left -->
  <rect x="0" y="0" width="6" height="160" rx="3" fill="#ffffff" opacity="0.3"/>

  <!-- Logo icon box -->
  <rect x="36" y="44" width="56" height="56" rx="10" fill="#ffffff" opacity="0.15"/>
  <rect x="36" y="44" width="56" height="56" rx="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <text x="64" y="84" font-family="monospace" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">⌘</text>

  <!-- Title: white -->
  <text x="112" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">Claude<tspan fill="#d4f0d0">OS</tspan></text>

  <!-- Subtitle: light white -->
  <text x="113" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#c8e6c4" letter-spacing="0.5">AI Operating System · 7-Layer Agent Coordination Platform</text>

  <!-- Pills: white/translucent -->
  <rect x="113" y="122" width="62" height="22" rx="11" fill="#ffffff" opacity="0.18"/>
  <text x="144" y="137" font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle">v1.0.0</text>

  <rect x="185" y="122" width="62" height="22" rx="11" fill="#ffffff" opacity="0.12"/>
  <text x="216" y="137" font-family="monospace" font-size="11" fill="#e0f0de" text-anchor="middle">Python</text>

  <rect x="257" y="122" width="70" height="22" rx="11" fill="#ffffff" opacity="0.12"/>
  <text x="292" y="137" font-family="monospace" font-size="11" fill="#e0f0de" text-anchor="middle">Streamlit</text>

  <rect x="337" y="122" width="54" height="22" rx="11" fill="#ffffff" opacity="0.12"/>
  <text x="364" y="137" font-family="monospace" font-size="11" fill="#e0f0de" text-anchor="middle">Flask</text>

  <rect x="401" y="122" width="76" height="22" rx="11" fill="#ffffff" opacity="0.12"/>
  <text x="439" y="137" font-family="monospace" font-size="11" fill="#e0f0de" text-anchor="middle">Supabase</text>
</svg>
